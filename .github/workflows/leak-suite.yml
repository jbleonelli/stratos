name: ci

# Authorization + resolver gates. The DB suite runs the claim-bridge leak proof
# and the baseline slice; the API suite runs the AppSync resolver against the
# baseline schema. Both use PGlite (real Postgres via WASM) — no services needed.
on:
  push:
    branches: [main]
    paths:
      - "db/**"
      - "api/**"
      - ".github/workflows/leak-suite.yml"
  pull_request:
    paths:
      - "db/**"
      - "api/**"
      - ".github/workflows/leak-suite.yml"

jobs:
  db-suite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: db/proof
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: db/proof/package-lock.json
      - run: npm ci
      - name: Leak proof + baseline slice
        run: npm test

  api-suite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - name: AppSync resolver slice
        run: npm test
