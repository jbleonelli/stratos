name: leak-suite

# Cross-tenant leak proof — the hard authorization gate. Runs the claim-bridge
# leak suite (real Postgres via PGlite/WASM, no services needed) on every push
# and PR that touches the DB authz layer.
on:
  push:
    branches: [main]
    paths:
      - "db/**"
      - ".github/workflows/leak-suite.yml"
  pull_request:
    paths:
      - "db/**"
      - ".github/workflows/leak-suite.yml"

jobs:
  leak-suite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: db/proof
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: db/proof/package-lock.json

      - run: npm ci

      - name: Run cross-tenant leak suite
        run: npm test
