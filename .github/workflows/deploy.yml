name: deploy

# Manual, OIDC-authenticated Terraform runs against a real AWS account.
# Defaults to `plan`; set action=apply to actually mutate infrastructure.
#
# When action=apply AND enable_edge=true, this also builds the React SPA with the
# stack's Cognito/AppSync outputs baked in (VITE_*), syncs it to the private S3
# origin, and invalidates CloudFront — so the live UI is reachable after the run.
# A UI-only redeploy = re-run with apply+enable_edge (Terraform no-ops the infra,
# then rebuilds + publishes the SPA).
#
# Prerequisites (one-time):
#   1. infra/bootstrap applied  → the S3 tfstate bucket exists
#   2. infra/github-oidc applied → deploy role exists; put its ARN in the repo
#      variable AWS_DEPLOY_ROLE_ARN (Settings → Secrets and variables → Actions)
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Env / client id (tfstate key + stamp)."
        type: string
        default: dev
      action:
        description: "plan or apply"
        type: choice
        options: [plan, apply]
        default: plan
      enable_edge:
        description: "Deploy the CloudFront/WAF/SPA edge tier."
        type: boolean
        default: false
      enable_nat:
        description: "NAT egress for private subnets (agent worker AppSync push, Bedrock)."
        type: boolean
        default: false
      enable_simulator:
        description: "Scheduled signal simulator that drives the agent loop."
        type: boolean
        default: false

permissions:
  id-token: write # required for OIDC
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    concurrency: deploy-${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Build Lambda bundles
        working-directory: api
        run: npm ci && npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Init
        working-directory: infra
        run: terraform init -input=false -backend-config="key=${{ inputs.environment }}.tfstate"

      - name: Plan
        working-directory: infra
        run: |
          terraform plan -input=false -out=tf.plan \
            -var "environment=${{ inputs.environment }}" \
            -var "enable_edge=${{ inputs.enable_edge }}" \
            -var "enable_nat=${{ inputs.enable_nat }}" \
            -var "enable_simulator=${{ inputs.enable_simulator }}"

      - name: Apply
        if: ${{ inputs.action == 'apply' }}
        working-directory: infra
        run: terraform apply -input=false tf.plan

      # ── Publish the SPA (only on apply + edge) ──────────────────────────────
      # Read the just-applied outputs, build web/ with them baked in as VITE_*,
      # push to the private S3 origin, and invalidate CloudFront.
      - name: Read SPA outputs
        id: spa
        if: ${{ inputs.action == 'apply' && inputs.enable_edge }}
        working-directory: infra
        run: |
          {
            echo "bucket=$(terraform output -raw spa_bucket)"
            echo "distribution_id=$(terraform output -raw cloudfront_distribution_id)"
            echo "spa_url=$(terraform output -raw spa_url)"
            echo "user_pool_id=$(terraform output -raw cognito_user_pool_id)"
            echo "user_pool_client_id=$(terraform output -raw cognito_user_pool_client_id)"
            echo "graphql_url=$(terraform output -raw graphql_url)"
          } >> "$GITHUB_OUTPUT"

      - name: Build SPA
        if: ${{ inputs.action == 'apply' && inputs.enable_edge }}
        working-directory: web
        env:
          VITE_USER_POOL_ID: ${{ steps.spa.outputs.user_pool_id }}
          VITE_USER_POOL_CLIENT_ID: ${{ steps.spa.outputs.user_pool_client_id }}
          VITE_GRAPHQL_URL: ${{ steps.spa.outputs.graphql_url }}
          VITE_AWS_REGION: us-east-1
        run: npm ci && npm run build

      - name: Publish SPA to S3 + invalidate CloudFront
        if: ${{ inputs.action == 'apply' && inputs.enable_edge }}
        working-directory: web
        run: |
          # Hashed assets are immutable; index.html must never be cached stale.
          aws s3 sync dist "s3://${{ steps.spa.outputs.bucket }}" \
            --delete --cache-control "public,max-age=31536000,immutable" \
            --exclude index.html
          aws s3 cp dist/index.html "s3://${{ steps.spa.outputs.bucket }}/index.html" \
            --cache-control "no-cache"
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.spa.outputs.distribution_id }}" \
            --paths "/*"
          echo "SPA published → ${{ steps.spa.outputs.spa_url }}"
