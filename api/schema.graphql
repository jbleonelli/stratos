# Stratos — GraphQL API (events/asks vertical slice + agent activity).
#
# Auth: Amazon Cognito user pools (primary) for the SPA; AWS_IAM (additional) so
# the agent runtime can publish activity server-side. Every Query/Mutation field
# is backed by the Lambda resolver in src/resolver.mjs (app-layer authz + the RLS
# claim bridge). Subscriptions are AppSync-native: the listed mutations publish
# to subscribers filtered by organizationId — no resolver code required.
#
# publishAgentActivity is a NONE-data-source passthrough used ONLY to fan out an
# agent decision to onAgentActivity subscribers; the agent worker calls it with
# SigV4 (AWS_IAM). Types reachable by both auth modes carry both directives.

enum EventKind { sensor_reading device_alert manual webhook schedule }
enum EventSeverity { info warning critical }
enum AskStatus { open answered dismissed expired }
enum OrgKind { customer platform contractor }
enum InviteStatus { pending accepted revoked expired }
enum ContractStatus { draft active suspended ended }
enum OrgLifecycle { trial active suspended deleted }
enum OrgRole { owner admin member }
enum LocationKind { building floor zone room }
enum DeviceStatus { online offline maintenance }

type Organization {
  id: ID!
  name: String!
  slug: String!
  kind: OrgKind!
  lifecycleState: OrgLifecycle!
  createdAt: AWSDateTime!
}

type Me {
  userId: ID!
  email: String!
  fullName: String
  orgRole: OrgRole!
}

type OrgMember {
  userId: ID!
  email: String!
  fullName: String
  orgRole: OrgRole!
  userRole: String!
  joinedAt: AWSDateTime!
  # Empty locationGrantIds with orgWideAccess=true → unrestricted org access.
  locationGrantIds: [ID!]!
  orgWideAccess: Boolean!
}

type Location {
  id: ID!
  organizationId: ID!
  parentId: ID
  name: String!
  kind: LocationKind!
  deviceCount: Int!
  latitude: Float
  longitude: Float
  createdAt: AWSDateTime!
}

type Device {
  id: ID!
  organizationId: ID!
  locationId: ID!
  name: String!
  kind: String!
  status: DeviceStatus!
  externalId: String
  createdAt: AWSDateTime!
}

type Event {
  id: ID!
  organizationId: ID!
  locationId: ID
  deviceId: ID
  kind: EventKind!
  severity: EventSeverity!
  externalId: String
  payload: AWSJSON
  createdAt: AWSDateTime!
}

type Ask {
  id: ID!
  organizationId: ID!
  locationId: ID
  eventId: ID
  question: String!
  status: AskStatus!
  answer: String
  createdBy: ID
  resolvedBy: ID
  createdAt: AWSDateTime!
  resolvedAt: AWSDateTime
}

# An agent decision, fanned out live to the SPA. Reachable by the SPA (Cognito
# subscription) and the agent worker (IAM mutation), so it carries both auth
# directives.
type AgentActivity @aws_iam @aws_cognito_user_pools {
  id: ID!
  organizationId: ID!
  eventId: ID
  decision: String!
  rationale: String
  costCents: Int!
  askId: ID
  createdAt: AWSDateTime!
}

input PublishAgentActivityInput {
  id: ID!
  organizationId: ID!
  eventId: ID
  decision: String!
  rationale: String
  costCents: Int!
  askId: ID
  createdAt: AWSDateTime!
}

input RaiseAskInput {
  question: String!
  locationId: ID
  eventId: ID
}

input AnswerAskInput {
  askId: ID!
  answer: String!
}

input IngestEventInput {
  kind: EventKind!
  severity: EventSeverity
  locationId: ID
  deviceId: ID
  externalId: String
  payload: AWSJSON
}

type SeverityCount {
  severity: EventSeverity!
  count: Int!
}

type DecisionCount {
  decision: String!
  count: Int!
}

type DayCount {
  day: AWSDate!
  count: Int!
}

# Aggregated org KPIs — scoped by RLS to the caller's active org.
type OrgMetrics {
  organizationId: ID!
  openAsks: Int!
  incidentsOpen: Int!
  eventsBySeverity: [SeverityCount!]!
  agentDecisions: [DecisionCount!]!
  agentCostCents24h: Int!
  devicesOnline: Int!
  devicesOffline: Int!
  devicesMaintenance: Int!
  locationCount: Int!
  eventsTrend7d: [DayCount!]!
}

input UpdateOrganizationInput {
  name: String!
}

input UpdateMemberRoleInput {
  userId: ID!
  role: OrgRole!
}

input SetMemberLocationGrantsInput {
  userId: ID!
  locationIds: [ID!]!
}

type OrgInvite {
  id: ID!
  email: String!
  orgRole: OrgRole!
  status: InviteStatus!
  locationGrantIds: [ID!]!
  orgWideAccess: Boolean!
  invitedBy: ID!
  expiresAt: AWSDateTime!
  createdAt: AWSDateTime!
}

type InviteOrgMemberPayload {
  invite: OrgInvite!
  inviteToken: String!
}

input InviteOrgMemberInput {
  email: String!
  role: OrgRole = member
  locationIds: [ID!] = []
}

input AcceptOrgInviteInput {
  token: String!
}

input CreateOrganizationInput {
  companyName: String!
}

type SlaRule {
  severity: EventSeverity!
  responseMinutes: Int!
}

type ServiceContract {
  id: ID!
  customerOrgId: ID!
  contractorOrgId: ID!
  customerOrgName: String!
  contractorOrgName: String!
  name: String!
  referenceCode: String
  status: ContractStatus!
  startsAt: AWSDate
  endsAt: AWSDate
  locationIds: [ID!]!
  slaRules: [SlaRule!]!
  assigneeUserIds: [ID!]!
  createdAt: AWSDateTime!
}

input SlaRuleInput {
  severity: EventSeverity!
  responseMinutes: Int!
}

input CreateServiceContractInput {
  contractorOrgId: ID!
  name: String!
  referenceCode: String
  locationIds: [ID!]!
  slaRules: [SlaRuleInput!]
}

type Query {
  me: Me
  organization: Organization
  orgMembers: [OrgMember!]!
  orgInvites(status: InviteStatus): [OrgInvite!]!
  myPendingInvites: [OrgInvite!]!
  contractorOrganizations: [Organization!]!
  serviceContracts(status: ContractStatus): [ServiceContract!]!
  locations: [Location!]!
  devices(locationId: ID, limit: Int = 200): [Device!]!
  events(limit: Int = 50): [Event!]!
  # Warning + critical events — the operator-facing incident queue.
  incidents(limit: Int = 50): [Event!]!
  # Historical agent decision log (live updates arrive via onAgentActivity).
  agentRuns(limit: Int = 50): [AgentActivity!]!
  orgMetrics: OrgMetrics!
  asks(status: AskStatus): [Ask!]!
}

type Mutation {
  createOrganization(input: CreateOrganizationInput!): Organization!
  inviteOrgMember(input: InviteOrgMemberInput!): InviteOrgMemberPayload!
  revokeOrgInvite(inviteId: ID!): OrgInvite!
  acceptOrgInvite(input: AcceptOrgInviteInput!): OrgMember!
  createServiceContract(input: CreateServiceContractInput!): ServiceContract!
  updateContractStatus(id: ID!, status: ContractStatus!): ServiceContract!
  assignContractMember(contractId: ID!, userId: ID!): ServiceContract!
  updateOrganization(input: UpdateOrganizationInput!): Organization!
  updateMemberRole(input: UpdateMemberRoleInput!): OrgMember!
  setMemberLocationGrants(input: SetMemberLocationGrantsInput!): OrgMember!
  raiseAsk(input: RaiseAskInput!): Ask!
  answerAsk(input: AnswerAskInput!): Ask!
  ingestEvent(input: IngestEventInput!): Event!
  # Server-to-server only (AWS_IAM): the agent runtime publishes a decision so
  # onAgentActivity subscribers get it live. Not for SPA callers.
  publishAgentActivity(input: PublishAgentActivityInput!): AgentActivity
    @aws_iam
}

type Subscription {
  onAskRaised(organizationId: ID!): Ask
    @aws_subscribe(mutations: ["raiseAsk"])
  onEventIngested(organizationId: ID!): Event
    @aws_subscribe(mutations: ["ingestEvent"])
  onAgentActivity(organizationId: ID!): AgentActivity
    @aws_subscribe(mutations: ["publishAgentActivity"])
    @aws_cognito_user_pools
}
